<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Mot de passe membre - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Créer ou modifier le mot de passe de votre compte membre La Clé du Parc.">

  <!-- SITEBASE : config.js est chargé avant les scripts métier -->
  <script src="../../../config.js"></script>

  <script>
    (() => {
      const siteRootRelative = "../../../";
      const baseDepuisChemin = new URL(siteRootRelative, window.location.href);

      let siteBaseFallback = baseDepuisChemin.pathname.replace(/\/$/, "");

      if (siteBaseFallback === "/") {
        siteBaseFallback = "";
      }

      function nettoyerBaseUrl(value) {
        return String(value || "").replace(/\/+$/, "");
      }

      function joindreBaseEtChemin(baseUrl, chemin) {
        const base = nettoyerBaseUrl(baseUrl);
        const cheminNettoye = "/" + String(chemin || "").replace(/^\/+/, "");

        if (!base) {
          return cheminNettoye;
        }

        return base + cheminNettoye;
      }

      function urlAbsolueOuTechnique(chemin) {
        const valeur = String(chemin || "");

        return (
          !valeur ||
          valeur.startsWith("#") ||
          valeur.startsWith("mailto:") ||
          valeur.startsWith("tel:") ||
          valeur.startsWith("http://") ||
          valeur.startsWith("https://")
        );
      }

      window.SITE_ROOT_RELATIVE = siteRootRelative;

      window.SITE_BASE = nettoyerBaseUrl(
        window.SITE_CONFIG?.membreBaseUrl ||
        window.SITE_CONFIG?.MEMBRE_BASE ||
        window.SITE_CONFIG?.siteBase ||
        siteBaseFallback ||
        ""
      );

      window.LCDP_SHARED_ASSETS_BASE = nettoyerBaseUrl(
        window.SITE_CONFIG?.assetsBaseUrl ||
        window.SITE_CONFIG?.commonAssetsBaseUrl ||
        window.SITE_CONFIG?.publicBaseUrl ||
        window.SITE_CONFIG?.PUBLIC_BASE ||
        ""
      );

      window.construireUrlAsset = function construireUrlAsset(chemin) {
        const valeur = String(chemin || "");

        if (urlAbsolueOuTechnique(valeur)) {
          return valeur;
        }

        if (window.LCDP_SHARED_ASSETS_BASE) {
          return joindreBaseEtChemin(window.LCDP_SHARED_ASSETS_BASE, valeur);
        }

        return valeur.startsWith("/")
          ? siteRootRelative.replace(/\/?$/, "/") + valeur.replace(/^\//, "")
          : valeur;
      };

      function chargerCssAsset(chemin) {
        const href = window.construireUrlAsset(chemin);

        if (!href) return;

        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = href;
        document.head.appendChild(link);
      }

      chargerCssAsset("/OBJETS/CSS/base.css");
      chargerCssAsset("/OBJETS/CSS/formulaire.css");
      chargerCssAsset("/OBJETS/CSS/lightbox-information.css");
    })();
  </script>
</head>

<body>
  <div class="site-page">

    <div id="lightbox-information-container"></div>

    <main class="site-main">

      <section class="page-section page-section-large" aria-label="Mot de passe du compte membre">
        <div class="page-container">
          <div class="page-content page-content-spaced">

            <h1 class="titre-formulaire">
              Mot de passe membre
            </h1>

            <p class="page-lead" id="texte-mode-mdp"></p>

            <p class="formulaire-note">
              Vous pourrez vous connecter depuis la page de
              <a
                id="lien-connexion-membre"
                href="#"
              >
                connexion membre
              </a>.
            </p>

            <div class="formulaire-page">

              <form
                id="formulaire-mdp-membre"
                class="formulaire-inscription"
                novalidate
              >

                <div class="formulaire-champ">
                  <label for="passwordmembre">
                    Mot de passe
                  </label>

                  <p class="formulaire-note">
                    Votre mot de passe doit contenir au moins 10 caractères.
                  </p>

                  <input
                    type="password"
                    id="passwordmembre"
                    name="passwordmembre"
                    placeholder="Mot de passe"
                    autocomplete="new-password"
                    required
                  >

                  <label class="checkbox-ligne" for="afficher-mdp-membre">
                    <input
                      type="checkbox"
                      id="afficher-mdp-membre"
                    >
                    <span>Afficher le mot de passe</span>
                  </label>
                </div>

                <div class="formulaire-actions">
                  <button
                    type="submit"
                    id="bouton-valider-formulaire"
                    class="button"
                  >
                    Valider
                  </button>
                </div>

              </form>

            </div>

          </div>
        </div>
      </section>

    </main>

  </div>

  <script>
    (() => {
      function chargerScript(src) {
        return new Promise((resolve, reject) => {
          if (!src) {
            resolve();
            return;
          }

          const script = document.createElement("script");
          script.src = src;
          script.defer = true;
          script.onload = () => resolve();
          script.onerror = () => reject(new Error("Impossible de charger " + src));
          document.body.appendChild(script);
        });
      }

      const lightboxInformationSrc =
        typeof window.construireUrlAsset === "function"
          ? window.construireUrlAsset("/OBJETS/BLOCS/lightbox-information.js")
          : "";

      chargerScript(lightboxInformationSrc)
        .catch(() => {})
        .finally(() => {
          chargerScript("./mdp-membre.js").catch(() => {});
        });
    })();
  </script>
</body>
</html>
