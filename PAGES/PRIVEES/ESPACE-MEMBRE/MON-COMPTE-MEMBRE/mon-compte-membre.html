<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Mon compte membre - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Consulter et modifier les informations de votre compte membre La Clé du Parc.">

  <!-- SITEBASE : config.js est chargé avant les scripts métier -->
  <script src="../../../../config.js"></script>

  <script>
    (() => {
      const siteRootRelative = "../../../../";
      const baseDepuisChemin = new URL(siteRootRelative, window.location.href);

      let siteBaseFallback = baseDepuisChemin.pathname.replace(/\/$/, "");

      if (siteBaseFallback === "/") {
        siteBaseFallback = "";
      }

      function nettoyerBaseUrl(value) {
        return String(value || "").replace(/\/+$/, "");
      }

      function joindreBaseEtChemin(baseUrl, chemin) {
        const valeur = String(chemin || "");

        if (
          !valeur ||
          valeur.startsWith("#") ||
          valeur.startsWith("mailto:") ||
          valeur.startsWith("tel:") ||
          valeur.startsWith("http://") ||
          valeur.startsWith("https://")
        ) {
          return valeur;
        }

        const base = nettoyerBaseUrl(baseUrl);
        const cheminNettoye = "/" + valeur.replace(/^\/+/, "");

        if (!base) {
          return cheminNettoye;
        }

        return base + cheminNettoye;
      }

      window.SITE_ROOT_RELATIVE = siteRootRelative;

      window.SITE_BASE = nettoyerBaseUrl(
        window.SITE_CONFIG?.membreBaseUrl ||
        window.SITE_CONFIG?.MEMBRE_BASE ||
        siteBaseFallback ||
        ""
      );

      window.ASSETS_BASE = nettoyerBaseUrl(
        window.SITE_CONFIG?.publicBaseUrl ||
        window.SITE_CONFIG?.PUBLIC_BASE ||
        ""
      );

      window.construireUrlMembre = function construireUrlMembre(chemin) {
        if (typeof window.SITE_CONFIG?.membreUrl === "function") {
          return window.SITE_CONFIG.membreUrl(chemin);
        }

        return joindreBaseEtChemin(window.SITE_BASE, chemin);
      };

      window.construireUrlAsset = function construireUrlAsset(chemin) {
        return joindreBaseEtChemin(window.ASSETS_BASE, chemin);
      };

      function ecrireCssAsset(chemin) {
        const href = window.construireUrlAsset(chemin);

        if (!href) return;

        document.write('<link rel="stylesheet" href="' + href + '">');
      }

      ecrireCssAsset("/OBJETS/CSS/base.css");
      ecrireCssAsset("/OBJETS/CSS/bandeau-et-burger.css");
      ecrireCssAsset("/OBJETS/CSS/footer.css");
      ecrireCssAsset("/OBJETS/CSS/formulaire.css");
      ecrireCssAsset("/OBJETS/CSS/boite-dialogue.css");
      ecrireCssAsset("/OBJETS/CSS/lightbox-information.css");
    })();
  </script>
</head>

<body>
  <div class="site-page">

    <div id="bandeau-nav-container">
      <header class="site-header">
        <div class="site-header-inner">
          <a href="/index.html" data-space="membre" class="site-logo">
            <img
              class="site-logo-img"
              src="/OBJETS/IMAGES/LOGO/logo-bandeau-96.webp"
              width="96"
              height="96"
              alt=""
              aria-hidden="true"
              loading="eager"
              fetchpriority="high"
              decoding="async"
            >
            <span>Espace membre</span>
          </a>

          <button
            class="burger-button"
            type="button"
            aria-label="Ouvrir le menu"
            aria-expanded="false"
            aria-controls="burger-nav-membre"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>

          <nav
            id="burger-nav-membre"
            class="burger-nav burger-nav-membre"
            aria-label="Navigation membre"
          >
            <a href="/index.html?source=menu" data-space="public">Accueil</a>
            <a href="/index.html?source=menu" data-space="membre">Espace membre</a>
            <a href="/PAGES/PUBLIQUES/ACTUALITES/actualites.html?source=menu" data-space="public">Actualités</a>
            <a href="/PAGES/PRIVEES/ESPACE-MEMBRE/LES-PARCS/les-parcs.html?source=menu" data-space="membre">Les parcs</a>
            <a href="/PAGES/PRIVEES/ESPACE-MEMBRE/LES-COACHS/les-coachs.html?source=menu" data-space="membre">Les coachs</a>
            <a href="/PAGES/PUBLIQUES/CHOIX-CONNEXION/choix-connexion.html?source=menu" data-space="public">Changer de compte</a>
          </nav>
        </div>
      </header>
    </div>

    <div id="boite-dialogue-container"></div>
    <div id="lightbox-information-container"></div>

    <main class="site-main">

      <section class="page-section page-section-large" aria-label="Compte membre">
        <div class="page-container">
          <div class="page-content page-content-spaced">

            <h1 class="site-title">
              Mon compte
            </h1>

            <div class="page-actions page-actions-grid page-actions-column" aria-label="Navigation compte membre">

              <a
                class="button"
                href="/index.html"
                data-site-href="/index.html"
              >
                Retour à l’espace membre
              </a>

            </div>

            <p class="page-lead">
              Retrouvez vos informations de membre du club.
            </p>

            <div class="formulaire-page" aria-label="Informations du compte membre">
              <form class="formulaire-inscription" id="form-mon-compte-membre" novalidate>

                <h2 class="titre-formulaire">
                  Mes informations
                </h2>

                <div class="formulaire-champ">
                  <label for="champ-nom-membre">
                    Nom
                  </label>
                  <input
                    id="champ-nom-membre"
                    type="text"
                    value="Chargement..."
                    readonly
                  >
                </div>

                <div class="formulaire-champ">
                  <label for="champ-prenom-membre">
                    Prénom
                  </label>
                  <input
                    id="champ-prenom-membre"
                    type="text"
                    value="Chargement..."
                    readonly
                  >
                </div>

                <div class="formulaire-champ" style="margin-bottom: var(--space-1);">
                  <label for="champ-email-membre">
                    E-mail
                  </label>
                  <input
                    id="champ-email-membre"
                    type="email"
                    value="Chargement..."
                    readonly
                  >
                </div>

                <div class="formulaire-actions" style="margin-top: 0; margin-bottom: var(--space-3);">
                  <button
                    class="button button-secondary"
                    type="button"
                    id="modifier-email-membre"
                  >
                    Modifier mon e-mail
                  </button>
                </div>

                <div class="formulaire-champ">
                  <label for="champ-date-creation-membre">
                    Date d’inscription
                  </label>
                  <input
                    id="champ-date-creation-membre"
                    type="text"
                    value="Chargement..."
                    readonly
                  >
                </div>

                <div class="formulaire-champ">
                  <label for="champ-statut-membre">
                    Statut
                  </label>
                  <input
                    id="champ-statut-membre"
                    type="text"
                    value="Chargement..."
                    readonly
                  >
                </div>

                <div class="formulaire-champ" style="margin-bottom: var(--space-1);">
                  <label for="champ-parrain-membre">
                    Parrain
                  </label>
                  <input
                    id="champ-parrain-membre"
                    type="text"
                    value="Chargement..."
                    readonly
                  >
                </div>

                <div class="formulaire-actions" style="margin-top: 0; margin-bottom: var(--space-3);">
                  <button
                    class="button button-secondary"
                    type="button"
                    id="modifier-parrain-membre"
                  >
                    Modifier mon parrain
                  </button>
                </div>

                <div class="formulaire-champ" style="margin-bottom: var(--space-1);">
                  <label for="champ-departement-membre">
                    Département
                  </label>
                  <input
                    id="champ-departement-membre"
                    type="text"
                    value="Chargement..."
                    readonly
                  >
                </div>

                <div class="formulaire-actions" style="margin-top: 0; margin-bottom: var(--space-3);">
                  <button
                    class="button button-secondary"
                    type="button"
                    id="modifier-departement-membre"
                  >
                    Modifier mon département
                  </button>
                </div>

                <div class="formulaire-champ">
                  <label for="champ-reglement-club">
                    Date d'acceptation du règlement (club)
                  </label>
                  <input
                    id="champ-reglement-club"
                    type="text"
                    value="Chargement..."
                    readonly
                  >
                </div>

                <div class="formulaire-champ">
                  <label for="champ-reglement-application">
                    Date d'acceptation du règlement (application)
                  </label>
                  <input
                    id="champ-reglement-application"
                    type="text"
                    value="Chargement..."
                    readonly
                  >
                </div>

              </form>
            </div>

          </div>
        </div>
      </section>

    </main>

    <div id="footer-container"></div>

  </div>

  <script>
    (() => {
      document.querySelectorAll("[data-site-href]").forEach((element) => {
        element.setAttribute("href", window.construireUrlMembre(element.dataset.siteHref));
      });
    })();
  </script>

  <script>
    (() => {
      function ecrireScriptAsset(chemin) {
        const src = window.construireUrlAsset(chemin);

        if (!src) return;

        document.write('<script src="' + src + '"><\/script>');
      }

      ecrireScriptAsset("/OBJETS/BLOCS/burger-membre.js");
      ecrireScriptAsset("/OBJETS/BLOCS/footer-global.js");
      ecrireScriptAsset("/OBJETS/BLOCS/boite-dialogue.js");
      ecrireScriptAsset("/OBJETS/BLOCS/lightbox-information.js");
    })();
  </script>

  <script src="./mon-compte-membre.js"></script>
</body>
</html>
