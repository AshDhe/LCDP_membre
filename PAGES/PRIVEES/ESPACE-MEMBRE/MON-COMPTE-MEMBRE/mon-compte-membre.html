<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Mon compte membre - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Consulter et modifier les informations de votre compte membre La Clé du Parc.">

  <script src="../../../../config.js"></script>

  <script>
    (() => {
      const siteRootRelative = "../../../../";
      const baseDepuisChemin = new URL(siteRootRelative, window.location.href);

      let siteBaseFallback = baseDepuisChemin.pathname.replace(/\/$/, "");

      if (siteBaseFallback === "/") {
        siteBaseFallback = "";
      }

      window.SITE_ROOT_RELATIVE = siteRootRelative;

      window.SITE_BASE = (
        window.SITE_CONFIG?.membreBaseUrl ||
        window.SITE_CONFIG?.MEMBRE_BASE ||
        siteBaseFallback ||
        ""
      ).replace(/\/$/, "");

      window.ASSETS_BASE = (
        window.SITE_CONFIG?.publicBaseUrl ||
        window.SITE_CONFIG?.PUBLIC_BASE ||
        ""
      ).replace(/\/$/, "");

      function chargerCss(chemin) {
        const base = window.ASSETS_BASE;

        if (!base || !chemin) return;

        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = base + chemin;
        document.head.appendChild(link);
      }

      chargerCss("/OBJETS/CSS/base.css");
      chargerCss("/OBJETS/CSS/bandeau-et-burger.css");
      chargerCss("/OBJETS/CSS/footer.css");
      chargerCss("/OBJETS/CSS/formulaire.css");
      chargerCss("/OBJETS/CSS/boite-dialogue.css");
      chargerCss("/OBJETS/CSS/lightbox-information.css");
    })();
  </script>
</head>

<body>
  <div class="site-page">

    <div id="bandeau-nav-container"></div>
    <div id="boite-dialogue-container"></div>
    <div id="lightbox-information-container"></div>

    <main class="site-main">

      <section class="page-section page-section-large" aria-label="Compte membre">
        <div class="page-container">
          <div class="page-content page-content-spaced">

            <h1 class="site-title">
              Mon compte
            </h1>

            <p class="page-lead">
              Retrouvez vos informations de membre du club.
            </p>

            <div class="formulaire-page" aria-label="Informations du compte membre">
              <form class="formulaire-inscription" id="form-mon-compte-membre" novalidate>

                <h2 class="titre-formulaire">
                  Mes informations
                </h2>

                <div class="formulaire-champ">
                  <label for="champ-nom-membre">
                    Nom
                  </label>
                  <input
                    id="champ-nom-membre"
                    type="text"
                    value="Chargement..."
                    readonly
                  >
                </div>

                <div class="formulaire-champ">
                  <label for="champ-prenom-membre">
                    Prénom
                  </label>
                  <input
                    id="champ-prenom-membre"
                    type="text"
                    value="Chargement..."
                    readonly
                  >
                </div>

                <div class="formulaire-champ" style="margin-bottom: var(--space-1);">
                  <label for="champ-email-membre">
                    E-mail
                  </label>
                  <input
                    id="champ-email-membre"
                    type="email"
                    value="Chargement..."
                    readonly
                  >
                </div>

                <div class="formulaire-actions" style="margin-top: 0; margin-bottom: var(--space-3);">
                  <button
                    class="button button-secondary"
                    type="button"
                    id="modifier-email-membre"
                  >
                    Modifier mon e-mail
                  </button>
                </div>

                <div class="formulaire-champ">
                  <label for="champ-date-creation-membre">
                    Date d’inscription
                  </label>
                  <input
                    id="champ-date-creation-membre"
                    type="text"
                    value="Chargement..."
                    readonly
                  >
                </div>

                <div class="formulaire-champ">
                  <label for="champ-statut-membre">
                    Statut
                  </label>
                  <input
                    id="champ-statut-membre"
                    type="text"
                    value="Chargement..."
                    readonly
                  >
                </div>

                <div class="formulaire-champ" style="margin-bottom: var(--space-1);">
                  <label for="champ-parrain-membre">
                    Parrain
                  </label>
                  <input
                    id="champ-parrain-membre"
                    type="text"
                    value="Chargement..."
                    readonly
                  >
                </div>

                <div class="formulaire-actions" style="margin-top: 0; margin-bottom: var(--space-3);">
                  <button
                    class="button button-secondary"
                    type="button"
                    id="modifier-parrain-membre"
                  >
                    Modifier mon parrain
                  </button>
                </div>

                <div class="formulaire-champ" style="margin-bottom: var(--space-1);">
                  <label for="champ-departement-membre">
                    Département
                  </label>
                  <input
                    id="champ-departement-membre"
                    type="text"
                    value="Chargement..."
                    readonly
                  >
                </div>

                <div class="formulaire-actions" style="margin-top: 0; margin-bottom: var(--space-3);">
                  <button
                    class="button button-secondary"
                    type="button"
                    id="modifier-departement-membre"
                  >
                    Modifier mon département
                  </button>
                </div>

                <div class="formulaire-champ">
                  <label for="champ-reglement-club">
                    Règlement accepté du club
                  </label>
                  <input
                    id="champ-reglement-club"
                    type="text"
                    value="Chargement..."
                    readonly
                  >
                </div>

                <div class="formulaire-champ">
                  <label for="champ-reglement-application">
                    Règlement accepté de l’application
                  </label>
                  <input
                    id="champ-reglement-application"
                    type="text"
                    value="Chargement..."
                    readonly
                  >
                </div>

              </form>
            </div>

            <div class="page-actions page-actions-grid page-actions-column" aria-label="Navigation compte membre">

              <a
                class="button"
                href="/index.html"
                data-site-href="/index.html"
              >
                Retour à l’espace membre
              </a>

            </div>

          </div>
        </div>
      </section>

    </main>

    <div id="footer-container"></div>

  </div>

  <script>
    (() => {
      const siteBase = (
        window.SITE_BASE ||
        window.SITE_CONFIG?.membreBaseUrl ||
        window.SITE_CONFIG?.MEMBRE_BASE ||
        ""
      ).replace(/\/$/, "");

      function construireUrlMembre(chemin) {
        const valeur = String(chemin || "");

        if (
          !valeur ||
          valeur.startsWith("#") ||
          valeur.startsWith("mailto:") ||
          valeur.startsWith("tel:") ||
          valeur.startsWith("http://") ||
          valeur.startsWith("https://")
        ) {
          return valeur;
        }

        if (typeof window.SITE_CONFIG?.membreUrl === "function") {
          return window.SITE_CONFIG.membreUrl(valeur);
        }

        if (siteBase) {
          return valeur.startsWith("/")
            ? siteBase + valeur
            : siteBase + "/" + valeur.replace(/^\.\//, "");
        }

        return valeur.startsWith("/") ? valeur : "/" + valeur;
      }

      document.querySelectorAll("[data-site-href]").forEach((element) => {
        element.setAttribute("href", construireUrlMembre(element.dataset.siteHref));
      });
    })();
  </script>

  <script>
    (() => {
      const assetsBase = (
        window.ASSETS_BASE ||
        window.SITE_CONFIG?.publicBaseUrl ||
        window.SITE_CONFIG?.PUBLIC_BASE ||
        ""
      ).replace(/\/$/, "");

      function chargerScript(src) {
        return new Promise((resolve, reject) => {
          if (!src) {
            resolve();
            return;
          }

          const script = document.createElement("script");
          script.src = src;
          script.defer = true;
          script.onload = resolve;
          script.onerror = reject;
          document.body.appendChild(script);
        });
      }

      function scriptAssets(chemin) {
        if (!assetsBase || !chemin) return Promise.resolve();
        return chargerScript(assetsBase + chemin);
      }

      scriptAssets("/OBJETS/BLOCS/burger-membre.js").catch(() => {});
      scriptAssets("/OBJETS/BLOCS/footer-global.js").catch(() => {});

      Promise.allSettled([
        scriptAssets("/OBJETS/BLOCS/boite-dialogue.js"),
        scriptAssets("/OBJETS/BLOCS/lightbox-information.js")
      ]).then(() => {
        return chargerScript("./mon-compte-membre.js");
      }).catch(() => {
        return chargerScript("./mon-compte-membre.js");
      });
    })();
  </script>
</body>
</html>
