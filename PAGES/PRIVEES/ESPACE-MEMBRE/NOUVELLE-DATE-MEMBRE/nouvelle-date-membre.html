<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Nouvelle date membre - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Choisir un parc et réserver une nouvelle date dans votre espace membre La Clé du Parc.">

  <script src="../../../../config.js"></script>

  <script>
    (() => {
      const siteRootRelative = "../../../../";
      const baseDepuisChemin = new URL(siteRootRelative, window.location.href);

      let siteBaseFallback = baseDepuisChemin.pathname.replace(/\/$/, "");

      if (siteBaseFallback === "/") {
        siteBaseFallback = "";
      }

      window.SITE_ROOT_RELATIVE = siteRootRelative;

      window.SITE_BASE = (
        window.SITE_CONFIG?.membreBaseUrl ||
        window.SITE_CONFIG?.MEMBRE_BASE ||
        siteBaseFallback ||
        ""
      ).replace(/\/$/, "");

      window.ASSETS_BASE = (
        window.SITE_CONFIG?.publicBaseUrl ||
        window.SITE_CONFIG?.PUBLIC_BASE ||
        siteBaseFallback ||
        ""
      ).replace(/\/$/, "");

      function chargerCss(chemin) {
        const base = window.ASSETS_BASE;

        if (!base || !chemin) return;

        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = base + chemin;
        document.head.appendChild(link);
      }

      chargerCss("/OBJETS/CSS/base.css");
      chargerCss("/OBJETS/CSS/bandeau-et-burger.css");
      chargerCss("/OBJETS/CSS/footer.css");
      chargerCss("/OBJETS/CSS/formulaire.css");
      chargerCss("/OBJETS/CSS/boite-dialogue.css");
      chargerCss("/OBJETS/CSS/lightbox-information.css");
      chargerCss("/OBJETS/CSS/nouvelle-date-membre.css");
      chargerCss("/OBJETS/CSS/carte-parc-membre.css");
    })();
  </script>
</head>

<body>
  <div class="site-page">

    <div id="bandeau-nav-container"></div>
    <div id="boite-dialogue-container"></div>
    <div id="lightbox-information-container"></div>

    <main class="site-main">

      <section class="page-section page-section-large" aria-label="Nouvelle date membre">
        <div class="page-container">
          <div class="page-content page-content-spaced">

            <h1 class="site-title">
              Nouvelle date
            </h1>

            <div class="page-actions page-actions-grid page-actions-column" aria-label="Actions nouvelle date">

              <button class="button" type="button" id="bouton-demander-ia">
                Passer directement par l'IA
              </button>

              <a
                class="button button-secondary"
                id="lien-fermer-nouvelle-date"
                href="/PAGES/PRIVEES/ESPACE-MEMBRE/MON-PLANNING-MEMBRE/mon-planning-membre.html"
                data-site-href="/PAGES/PRIVEES/ESPACE-MEMBRE/MON-PLANNING-MEMBRE/mon-planning-membre.html"
              >
                Retour à mon planning
              </a>

            </div>

            <p class="page-lead">
              Choisissez un parc pour réserver une nouvelle date.
            </p>

            <div class="formulaire-page" aria-label="Choix du parc">

              <table class="table" id="table-nouvelle-date-membre" aria-label="Liste des parcs du département">

                <thead>
                  <tr>
                    <th>
                      <span id="titre-departement-membre">Autour de moi</span>
                    </th>

                    <th>
                      <button class="micro-action" type="button" id="bouton-modifier-departement">
                        Changer de département
                      </button>
                    </th>
                  </tr>
                </thead>

                <tbody id="liste-parcs-membre">
                  <tr>
                    <td colspan="2">
                      Chargement des parcs de votre département...
                    </td>
                  </tr>
                </tbody>

              </table>

            </div>

          </div>
        </div>
      </section>

    </main>

    <div id="footer-container"></div>

  </div>

  <script>
    (() => {
      const siteBase = (
        window.SITE_BASE ||
        window.SITE_CONFIG?.membreBaseUrl ||
        window.SITE_CONFIG?.MEMBRE_BASE ||
        ""
      ).replace(/\/$/, "");

      function construireUrlMembre(chemin) {
        const valeur = String(chemin || "");

        if (
          !valeur ||
          valeur.startsWith("#") ||
          valeur.startsWith("mailto:") ||
          valeur.startsWith("tel:") ||
          valeur.startsWith("http://") ||
          valeur.startsWith("https://")
        ) {
          return valeur;
        }

        if (typeof window.SITE_CONFIG?.membreUrl === "function") {
          return window.SITE_CONFIG.membreUrl(valeur);
        }

        if (siteBase) {
          return valeur.startsWith("/")
            ? siteBase + valeur
            : siteBase + "/" + valeur.replace(/^\.\//, "");
        }

        return valeur.startsWith("/") ? valeur : "/" + valeur;
      }

      document.querySelectorAll("[data-site-href]").forEach((element) => {
        element.setAttribute("href", construireUrlMembre(element.dataset.siteHref));
      });
    })();
  </script>

  <script>
    (() => {
      const assetsBase = (
        window.ASSETS_BASE ||
        window.SITE_CONFIG?.publicBaseUrl ||
        window.SITE_CONFIG?.PUBLIC_BASE ||
        ""
      ).replace(/\/$/, "");

      function chargerScript(src) {
        return new Promise((resolve, reject) => {
          if (!src) {
            resolve();
            return;
          }

          const script = document.createElement("script");
          script.src = src;
          script.defer = true;
          script.onload = resolve;
          script.onerror = reject;
          document.body.appendChild(script);
        });
      }

      function scriptAssets(chemin) {
        if (!assetsBase || !chemin) return Promise.resolve();
        return chargerScript(assetsBase + chemin);
      }

      scriptAssets("/OBJETS/BLOCS/burger-membre.js").catch(() => {});
      scriptAssets("/OBJETS/BLOCS/footer-global.js").catch(() => {});

      Promise.allSettled([
        scriptAssets("/OBJETS/BLOCS/boite-dialogue.js"),
        scriptAssets("/OBJETS/BLOCS/lightbox-information.js")
      ]).then(() => {
        return chargerScript("./nouvelle-date-membre.js");
      }).catch(() => {
        return chargerScript("./nouvelle-date-membre.js");
      });
    })();
  </script>
</body>
</html>
