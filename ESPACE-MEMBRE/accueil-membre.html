<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Accueil membre - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Choisir une action dans votre espace membre La Clé du Parc.">

  <script src="../config.js"></script>

  <script>
    (() => {
      "use strict";

      const config = window.SITE_CONFIG || {};

      function nettoyerBaseUrl(value) {
        return String(value || "").replace(/\/+$/, "");
      }

      function buildUrl(base, path) {
        return nettoyerBaseUrl(base) + "/" + String(path || "").replace(/^\/+/, "");
      }

      const membreBase = nettoyerBaseUrl(
        config.membreBaseUrl ||
        config.MEMBRE_BASE ||
        config.siteBase ||
        ""
      );

      const publicBase = nettoyerBaseUrl(
        config.publicBaseUrl ||
        config.PUBLIC_BASE ||
        ""
      );

      const objetBase = nettoyerBaseUrl(
        config.objetBaseUrl ||
        config.OBJET_BASE ||
        buildUrl(publicBase, "/OBJET")
      );

      window.SITE_BASE = membreBase;

      window.LCDP_MEMBRE_BASE = membreBase;
      window.LCDP_PUBLIC_BASE = publicBase;
      window.LCDP_OBJET_BASE = objetBase;

      window.LCDP_buildUrl = buildUrl;

      window.LCDP_urlPublic = function LCDP_urlPublic(path) {
        if (typeof config.publicUrl === "function") {
          return config.publicUrl(path);
        }

        return buildUrl(publicBase, path);
      };

      window.LCDP_urlMembre = function LCDP_urlMembre(path) {
        if (typeof config.membreUrl === "function") {
          return config.membreUrl(path);
        }

        return buildUrl(membreBase, path);
      };

      window.LCDP_urlObjet = function LCDP_urlObjet(path) {
        if (typeof config.objetUrl === "function") {
          return config.objetUrl(path);
        }

        return buildUrl(objetBase, path);
      };

      const feuillesCssObjet = [
        "/CSSBASE/cssbase.css",
        "/BOX/02-box-bandeau-nav.css",
        "/BOX/02-box-menu-burger.css",
        "/BOX/02-box-dialogue-bouton.css",
        "/BOX/02-box-alerte.css",
        "/BOX/02-box-footer.css"
      ];

      feuillesCssObjet.forEach((chemin) => {
        document.write(
          '<link rel="stylesheet" href="' +
          window.LCDP_urlObjet(chemin) +
          '">'
        );
      });
    })();
  </script>
</head>

<body>
  <div class="lcdp-site-page">

    <div id="lcdp-bandeau-slot"></div>

    <main class="lcdp-site-main">
      <section class="lcdp-page-section">
        <div class="lcdp-page-container">
          <div class="lcdp-page-content lcdp-stack-large">

            <h1 class="lcdp-title-page-center">Mes options club</h1>

            <p class="lcdp-text-strong-left" id="message-accueil-membre">
              Bonjour, que voulez-vous faire ?
            </p>

            <div id="lcdp-menu-central-slot"></div>

          </div>
        </div>
      </section>
    </main>

    <div id="lcdp-footer-slot"></div>
    <div id="lcdp-lightbox-slot"></div>

  </div>

  <script>
    (() => {
      "use strict";

      const config = window.SITE_CONFIG || {};

      function estUrlExterneOuAncre(chemin) {
        return (
          chemin.startsWith("#") ||
          chemin.startsWith("mailto:") ||
          chemin.startsWith("tel:") ||
          chemin.startsWith("http://") ||
          chemin.startsWith("https://") ||
          chemin.startsWith("data:")
        );
      }

      function construireUrlPublic(chemin) {
        const valeur = String(chemin || "");

        if (!valeur || estUrlExterneOuAncre(valeur)) {
          return valeur;
        }

        if (typeof window.LCDP_urlPublic === "function") {
          return window.LCDP_urlPublic(valeur);
        }

        return valeur;
      }

      function construireUrlMembre(chemin) {
        const valeur = String(chemin || "");

        if (!valeur || estUrlExterneOuAncre(valeur)) {
          return valeur;
        }

        if (typeof window.LCDP_urlMembre === "function") {
          return window.LCDP_urlMembre(valeur);
        }

        return valeur;
      }

      function construireUrlObjet(chemin) {
        const valeur = String(chemin || "");

        if (!valeur || estUrlExterneOuAncre(valeur)) {
          return valeur;
        }

        if (typeof window.LCDP_urlObjet === "function") {
          return window.LCDP_urlObjet(valeur);
        }

        return valeur;
      }

      function appliquerRoutesSite(racine = document) {
        racine.querySelectorAll("[data-site-href]").forEach((element) => {
          const chemin = element.dataset.siteHref || "";
          const espace = element.dataset.space || "public";

          if (espace === "membre") {
            element.setAttribute("href", construireUrlMembre(chemin));
            return;
          }

          element.setAttribute("href", construireUrlPublic(chemin));
        });

        racine.querySelectorAll("[data-site-src]").forEach((element) => {
          const chemin = element.dataset.siteSrc || "";
          const cheminObjet = chemin.replace(/^\/?OBJET\/?/, "/");
          element.setAttribute("src", construireUrlObjet(cheminObjet));
        });
      }

      function lireCookie(nom) {
        return document.cookie
          .split(";")
          .map((part) => part.trim())
          .some((part) => part.startsWith(nom + "="));
      }

      async function chargerFragmentObjet(chemin) {
        const reponse = await fetch(construireUrlObjet(chemin), {
          method: "GET",
          credentials: "omit",
          cache: "no-cache"
        });

        if (!reponse.ok) {
          throw new Error("Fragment OBJET introuvable : " + chemin);
        }

        const html = await reponse.text();
        const template = document.createElement("template");
        template.innerHTML = html.trim();

        return template.content.cloneNode(true);
      }

      function chargerScriptMembreUneFois(chemin) {
        const src = construireUrlMembre(chemin);

        if (document.querySelector(`script[data-lcdp-script="${chemin}"]`)) {
          return Promise.resolve();
        }

        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.defer = true;
          script.dataset.lcdpScript = chemin;
          script.onload = resolve;
          script.onerror = () => reject(new Error("Script membre introuvable : " + chemin));
          document.body.appendChild(script);
        });
      }

      async function afficherAlerte(message) {
        const slot = document.getElementById("lcdp-lightbox-slot");

        if (!slot) {
          return;
        }

        slot.innerHTML = "";

        const fragment = await chargerFragmentObjet("/BOX/02-box-alerte.html");
        slot.appendChild(fragment);

        const alerte = slot.querySelector("[data-lcdp-box-alerte]");
        const texte = slot.querySelector("[data-lcdp-alerte-message]");
        const boutonFermer = slot.querySelector("[data-lcdp-alerte-close]");
        const boutonOk = slot.querySelector("[data-lcdp-alerte-ok]");

        if (!alerte || !texte || !boutonFermer || !boutonOk) {
          throw new Error("Structure de l’alerte incomplète.");
        }

        texte.textContent = message;

        const fermer = () => {
          slot.innerHTML = "";
        };

        boutonFermer.addEventListener("click", fermer);
        boutonOk.addEventListener("click", fermer);

        alerte.addEventListener("click", (event) => {
          if (event.target === alerte) {
            fermer();
          }
        });

        document.addEventListener(
          "keydown",
          (event) => {
            if (event.key === "Escape") {
              fermer();
            }
          },
          { once: true }
        );
      }

      async function initialiserBandeau() {
        const slot = document.getElementById("lcdp-bandeau-slot");

        if (!slot) {
          return;
        }

        slot.innerHTML = "";

        const bandeau = await chargerFragmentObjet("/BOX/02-box-bandeau-nav.html");
        slot.appendChild(bandeau);

        appliquerRoutesSite(slot);

        await chargerScriptMembreUneFois("/ESPACE-MEMBRE/box-menu-burger-membre.js");

        if (typeof window.LCDP_initialiserMenuBurgerMembre === "function") {
          await window.LCDP_initialiserMenuBurgerMembre();
        }
      }

      async function initialiserMenuCentral() {
        const slot = document.getElementById("lcdp-menu-central-slot");

        if (!slot) {
          return;
        }

        slot.innerHTML = "";

        const fragment = await chargerFragmentObjet("/BOX/02-box-menu-bouton.html");
        slot.appendChild(fragment);

        const liste = slot.querySelector("[data-lcdp-menu-bouton-list]");

        if (!liste) {
          throw new Error("Structure du menu bouton incomplète.");
        }

        const boutons = [
          {
            label: "VALIDER",
            target: "/ESPACE-MEMBRE/valider-membre.html",
            abonnementRequis: false
          },
          {
            label: "RESERVER",
            target: "/ESPACE-MEMBRE/reserver-membre.html",
            abonnementRequis: true,
            message: "Cette fonction est réservée aux membres abonnés."
          },
          {
            label: "PLANNING",
            target: "/ESPACE-MEMBRE/planning-membre.html",
            abonnementRequis: false
          },
          {
            label: "INVITER",
            target: "/ESPACE-MEMBRE/inviter-membre.html",
            abonnementRequis: true,
            message: "Cette fonction est réservée aux membres abonnés."
          }
        ];

        boutons.forEach((bouton) => {
          const element = document.createElement("button");
          element.type = "button";
          element.className = "lcdp-button lcdp-button-primary";
          element.textContent = bouton.label;

          element.addEventListener("click", () => {
            if (bouton.abonnementRequis && !lireCookie("abonne")) {
              afficherAlerte(bouton.message).catch(console.error);
              return;
            }

            window.location.href = construireUrlMembre(bouton.target);
          });

          liste.appendChild(element);
        });
      }

      async function initialiserFooter() {
        const slot = document.getElementById("lcdp-footer-slot");

        if (!slot) {
          return;
        }

        slot.innerHTML = "";

        const footer = await chargerFragmentObjet("/BOX/02-box-footer.html");
        slot.appendChild(footer);

        appliquerRoutesSite(slot);
      }

      function nettoyerPrenom(value) {
        return String(value || "")
          .trim()
          .replace(/\s+/g, " ")
          .slice(0, 60);
      }

      async function initialiserMessageAccueil() {
        const messageAccueil = document.getElementById("message-accueil-membre");

        if (!messageAccueil) {
          return;
        }

        const workerIndexMembreUrl = (
          config.workerIndexMembreUrl ||
          config.WORKER_INDEX_MEMBRE_URL ||
          ""
        ).replace(/\/+$/, "");

        if (!workerIndexMembreUrl) {
          messageAccueil.textContent = "Bonjour, que voulez-vous faire ?";
          return;
        }

        try {
          const reponse = await fetch(workerIndexMembreUrl, {
            method: "GET",
            credentials: "include",
            cache: "no-store",
            headers: {
              "Accept": "application/json"
            }
          });

          const data = await reponse.json().catch(() => null);

          if (!reponse.ok || !data || data.success !== true || data.connected !== true) {
            messageAccueil.textContent = "Bonjour, que voulez-vous faire ?";
            return;
          }

          const prenom = nettoyerPrenom(data.prenommembre);

          messageAccueil.textContent = prenom
            ? `Bonjour ${prenom}, que voulez-vous faire ?`
            : "Bonjour, que voulez-vous faire ?";

        } catch (erreur) {
          console.error("Erreur accueil membre :", erreur);
          messageAccueil.textContent = "Bonjour, que voulez-vous faire ?";
        }
      }

      appliquerRoutesSite(document);

      initialiserBandeau()
        .then(initialiserMenuCentral)
        .then(initialiserFooter)
        .then(initialiserMessageAccueil)
        .catch((erreur) => {
          console.error(erreur);
        });
    })();
  </script>
</body>
</html>
