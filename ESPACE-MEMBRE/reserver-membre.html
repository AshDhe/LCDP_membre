<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Réserver - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Choisir un parc et réserver une nouvelle date dans votre espace membre La Clé du Parc.">

  <script src="../config.js"></script>

  <script>
    (() => {
      "use strict";

      const config = window.SITE_CONFIG || {};

      function nettoyerBaseUrl(value) {
        return String(value || "").replace(/\/+$/, "");
      }

      function buildUrl(base, path) {
        return nettoyerBaseUrl(base) + "/" + String(path || "").replace(/^\/+/, "");
      }

      const membreBase = nettoyerBaseUrl(
        config.membreBaseUrl ||
        config.MEMBRE_BASE ||
        config.siteBase ||
        ""
      );

      const publicBase = nettoyerBaseUrl(
        config.publicBaseUrl ||
        config.PUBLIC_BASE ||
        ""
      );

      const objetBase = nettoyerBaseUrl(
        config.objetBaseUrl ||
        config.OBJET_BASE ||
        buildUrl(publicBase, "/OBJET")
      );

      window.SITE_BASE = membreBase;
      window.LCDP_MEMBRE_BASE = membreBase;
      window.LCDP_PUBLIC_BASE = publicBase;
      window.LCDP_OBJET_BASE = objetBase;

      window.LCDP_urlPublic = function LCDP_urlPublic(path) {
        if (typeof config.publicUrl === "function") {
          return config.publicUrl(path);
        }

        return buildUrl(publicBase, path);
      };

      window.LCDP_urlMembre = function LCDP_urlMembre(path) {
        if (typeof config.membreUrl === "function") {
          return config.membreUrl(path);
        }

        return buildUrl(membreBase, path);
      };

      window.LCDP_urlObjet = function LCDP_urlObjet(path) {
        if (typeof config.objetUrl === "function") {
          return config.objetUrl(path);
        }

        return buildUrl(objetBase, path);
      };

      const feuillesCssObjet = [
        "/CSSBASE/cssbase.css",
        "/BOX/02-box-bandeau-nav.css",
        "/BOX/02-box-menu-burger.css",
        "/BOX/02-box-alerte.css",
        "/BOX/02-box-dialogue-bouton.css",
        "/BOX/04-box-card-abonnement.css",
        "/BOX/02-box-footer.css",
        "/BOX/03-box-champ-formulaire.css",
        "/BOX/03-box-galerie.css",
        "/BOX/04-box-dialogue-champ.css",
        "/BOX/04-box-liste-card.css",
        "/BOX/04-box-card-parc.css",
        "/BOX/04-box-card-map-parc.css",
        "/BOX/04-box-fiche-parc.css",
        "/BOX/04-box-shift-detail-parc.css",
        "/BOX/04-box-calendrier-mois.css",
        "/BOX/04-box-card-jour-in-calendrier-mois.css",
        "/BOX/04-box-calendrier-jour.css",
        "/BOX/04-box-card-heure-in-calendrier-jour.css",
        "/BOX/04-box-workflow-reservation.css",
        "/BOX/04-box-listemails.css"
      ];

      feuillesCssObjet.forEach((chemin) => {
        document.write(
          '<link rel="stylesheet" href="' +
          window.LCDP_urlObjet(chemin) +
          '">'
        );
      });
    })();
  </script>
</head>

<body>
  <div class="lcdp-site-page">

    <div id="lcdp-bandeau-slot"></div>

    <main class="lcdp-site-main">
      <section class="lcdp-page-section" aria-label="Réserver une date">
        <div class="lcdp-page-container">
          <div class="lcdp-page-content lcdp-page-content--avec-entete lcdp-stack-large">

            <header class="lcdp-page-header">
              <h1 class="lcdp-title-page-center">Réserver</h1>

              <p class="lcdp-mention-connexion">
                [Espace membre de l'application]
              </p>

              <p class="lcdp-mention-connexion" id="mention-statut-membre" aria-live="polite">
                [Chargement du statut membre]
              </p>
            </header>

            <p class="lcdp-text-strong-lead">
              Choisissez votre parc
            </p>

            <div class="lcdp-box-menu-bouton__list lcdp-box-menu-bouton__list--single" aria-label="Actions réservation membre">
              <button class="lcdp-button lcdp-button-primary" type="button" id="bouton-changer-departement">
                Changer de département
              </button>

              <button class="lcdp-button lcdp-button-orange" type="button" id="bouton-demander-ia">
                Rechercher avec l'IA
              </button>
            </div>

            <div id="lcdp-liste-card-parcs-slot"></div>

          </div>
        </div>
      </section>
    </main>

    <div id="lcdp-footer-slot"></div>
    <div id="lcdp-lightbox-slot"></div>

  </div>

  <script src="./reserver-membre.js"></script>
</body>
</html>
