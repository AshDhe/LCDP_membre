<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Espace membre - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Accès à l’espace membre La Clé du Parc.">

  <script src="./config.js"></script>
</head>

<body>
  <p>Redirection vers l’espace membre...</p>

  <script>
    (() => {
      "use strict";

      const config = window.SITE_CONFIG || {};
      const cible = typeof config.membreUrl === "function"
        ? config.membreUrl("/ESPACE-MEMBRE/accueil-membre.html")
        : "/ESPACE-MEMBRE/accueil-membre.html";

      window.location.replace(cible);
    })();
  </script>
</body>
</html>
