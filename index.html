<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Espace membre - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Choisir une action dans votre espace membre La Clé du Parc.">

  <!-- SITEBASE : config.js est chargé avant les scripts métier -->
  <script src="./config.js"></script>

  <script>
    (() => {
      const siteRootRelative = "./";
      const baseDepuisChemin = new URL(siteRootRelative, window.location.href);

      let siteBaseFallback = baseDepuisChemin.pathname.replace(/\/$/, "");

      if (siteBaseFallback === "/") {
        siteBaseFallback = "";
      }

      function nettoyerBaseUrl(value) {
        return String(value || "").replace(/\/+$/, "");
      }

      function joindreBaseEtChemin(baseUrl, chemin) {
        const base = nettoyerBaseUrl(baseUrl);
        const cheminNettoye = "/" + String(chemin || "").replace(/^\/+/, "");

        if (!base) {
          return cheminNettoye;
        }

        return base + cheminNettoye;
      }

      function cheminExterneOuAncre(chemin) {
        return (
          chemin.startsWith("#") ||
          chemin.startsWith("mailto:") ||
          chemin.startsWith("tel:") ||
          chemin.startsWith("http://") ||
          chemin.startsWith("https://")
        );
      }

      window.SITE_ROOT_RELATIVE = siteRootRelative;

      window.SITE_BASE = nettoyerBaseUrl(
        window.SITE_CONFIG?.membreBaseUrl ||
        window.SITE_CONFIG?.MEMBRE_BASE ||
        window.SITE_CONFIG?.siteBase ||
        siteBaseFallback ||
        ""
      );

      window.ASSETS_BASE = nettoyerBaseUrl(
        window.SITE_CONFIG?.publicBaseUrl ||
        window.SITE_CONFIG?.PUBLIC_BASE ||
        ""
      );

      window.construireUrlMembre = function construireUrlMembre(chemin) {
        const valeur = String(chemin || "");

        if (!valeur || cheminExterneOuAncre(valeur)) {
          return valeur;
        }

        return joindreBaseEtChemin(window.SITE_BASE, valeur);
      };

      window.construireUrlPublic = function construireUrlPublic(chemin) {
        const valeur = String(chemin || "");

        if (!valeur || cheminExterneOuAncre(valeur)) {
          return valeur;
        }

        return joindreBaseEtChemin(window.SITE_CONFIG?.publicBaseUrl || window.SITE_CONFIG?.PUBLIC_BASE || "", valeur);
      };

      window.construireUrlParc = function construireUrlParc(chemin) {
        const valeur = String(chemin || "");

        if (!valeur || cheminExterneOuAncre(valeur)) {
          return valeur;
        }

        return joindreBaseEtChemin(window.SITE_CONFIG?.parcBaseUrl || window.SITE_CONFIG?.PARC_BASE || "", valeur);
      };

      window.construireUrlCoach = function construireUrlCoach(chemin) {
        const valeur = String(chemin || "");

        if (!valeur || cheminExterneOuAncre(valeur)) {
          return valeur;
        }

        return joindreBaseEtChemin(window.SITE_CONFIG?.coachBaseUrl || window.SITE_CONFIG?.COACH_BASE || "", valeur);
      };

      window.construireUrlAsset = function construireUrlAsset(chemin) {
        return joindreBaseEtChemin(window.ASSETS_BASE, chemin);
      };

      window.construireUrlEspace = function construireUrlEspace(espace, chemin) {
        switch (espace) {
          case "public":
            return window.construireUrlPublic(chemin);

          case "parc":
            return window.construireUrlParc(chemin);

          case "coach":
            return window.construireUrlCoach(chemin);

          case "membre":
          default:
            return window.construireUrlMembre(chemin);
        }
      };

      window.corrigerCheminsSite = function corrigerCheminsSite(scope) {
        const racine = scope || document;

        racine.querySelectorAll("[data-site-href]").forEach((element) => {
          const espace = element.dataset.space || "membre";
          element.setAttribute("href", window.construireUrlEspace(espace, element.dataset.siteHref));
        });

        racine.querySelectorAll("[data-site-src]").forEach((element) => {
          element.setAttribute("src", window.construireUrlPublic(element.dataset.siteSrc));
        });
      };

      document.write(
        '<link rel="stylesheet" href="' +
        window.construireUrlAsset("/OBJETS/CSS/base.css") +
        '">'
      );

      document.write(
        '<link rel="stylesheet" href="' +
        window.construireUrlAsset("/OBJETS/CSS/bandeau-et-burger.css") +
        '">'
      );

      document.write(
        '<link rel="stylesheet" href="' +
        window.construireUrlAsset("/OBJETS/CSS/footer.css") +
        '">'
      );
    })();
  </script>
</head>

<body>
  <div class="site-page">

    <div id="bandeau-nav-container">
      <header class="site-header">
        <div class="site-header-inner">
          <a
            href="/index.html"
            data-site-href="/index.html"
            data-space="membre"
            class="site-logo"
          >
            <img
              class="site-logo-img"
              src="/OBJETS/IMAGES/LOGO/logo-bandeau-96.webp"
              data-site-src="/OBJETS/IMAGES/LOGO/logo-bandeau-96.webp"
              width="96"
              height="96"
              alt=""
              aria-hidden="true"
              loading="eager"
              fetchpriority="high"
              decoding="async"
            >
            <span>Espace membre</span>
          </a>

          <button
            class="burger-button"
            type="button"
            aria-label="Ouvrir le menu"
            aria-expanded="false"
            aria-controls="burger-nav-membre"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>

          <nav
            id="burger-nav-membre"
            class="burger-nav burger-nav-membre"
            aria-label="Navigation membre"
          >
            <a
              href="/index.html?source=menu"
              data-site-href="/index.html?source=menu"
              data-space="public"
            >
              Accueil
            </a>

            <a
              href="/index.html?source=menu"
              data-site-href="/index.html?source=menu"
              data-space="membre"
            >
              Espace membre
            </a>

            <a
              href="/PAGES/PUBLIQUES/ACTUALITES/actualites.html?source=menu"
              data-site-href="/PAGES/PUBLIQUES/ACTUALITES/actualites.html?source=menu"
              data-space="public"
            >
              Actualités
            </a>

            <a
              href="/PAGES/PRIVEES/ESPACE-MEMBRE/LES-PARCS/les-parcs.html?source=menu"
              data-site-href="/PAGES/PRIVEES/ESPACE-MEMBRE/LES-PARCS/les-parcs.html?source=menu"
              data-space="membre"
            >
              Les parcs
            </a>

            <a
              href="/PAGES/PRIVEES/ESPACE-MEMBRE/LES-COACHS/les-coachs.html?source=menu"
              data-site-href="/PAGES/PRIVEES/ESPACE-MEMBRE/LES-COACHS/les-coachs.html?source=menu"
              data-space="membre"
            >
              Les coachs
            </a>

            <a
              href="/PAGES/PUBLIQUES/CHOIX-CONNEXION/choix-connexion.html?source=menu"
              data-site-href="/PAGES/PUBLIQUES/CHOIX-CONNEXION/choix-connexion.html?source=menu"
              data-space="public"
            >
              Changer de compte
            </a>
          </nav>
        </div>
      </header>
    </div>

    <main class="site-main">

      <section class="page-section page-section-large" aria-label="Choix espace membre">
        <div class="page-container">
          <div class="page-content page-content-spaced">

            <h1 class="site-title">
              Espace membre
            </h1>

            <p class="page-lead" id="message-accueil-membre">
              Bonjour, que voulez-vous faire ?
            </p>

            <div class="page-actions page-actions-grid page-actions-column" aria-label="Actions membre">

              <a
                class="button"
                href="/PAGES/PRIVEES/ESPACE-MEMBRE/MON-PLANNING-MEMBRE/mon-planning-membre.html"
                data-site-href="/PAGES/PRIVEES/ESPACE-MEMBRE/MON-PLANNING-MEMBRE/mon-planning-membre.html"
                data-space="membre"
              >
                Voir mon planning
              </a>

              <a
                class="button"
                href="/PAGES/PRIVEES/ESPACE-MEMBRE/NOUVELLE-DATE-MEMBRE/nouvelle-date-membre.html"
                data-site-href="/PAGES/PRIVEES/ESPACE-MEMBRE/NOUVELLE-DATE-MEMBRE/nouvelle-date-membre.html"
                data-space="membre"
              >
                Déclarer une nouvelle date
              </a>

              <a
                class="button button-orange"
                style="margin-top: 0;"
                href="/PAGES/PRIVEES/ESPACE-MEMBRE/NOUVELLE-DATE-MEMBRE/demander-ia-membre.html"
                data-site-href="/PAGES/PRIVEES/ESPACE-MEMBRE/NOUVELLE-DATE-MEMBRE/demander-ia-membre.html"
                data-space="membre"
              >
                Rechercher avec l'IA
              </a>

              <a
                class="button"
                href="/PAGES/PRIVEES/ESPACE-MEMBRE/INVITER-MEMBRE/inviter-membre.html"
                data-site-href="/PAGES/PRIVEES/ESPACE-MEMBRE/INVITER-MEMBRE/inviter-membre.html"
                data-space="membre"
              >
                Inviter
              </a>

              <a
                class="button"
                href="/PAGES/PRIVEES/ESPACE-MEMBRE/MON-COMPTE-MEMBRE/mon-compte-membre.html"
                data-site-href="/PAGES/PRIVEES/ESPACE-MEMBRE/MON-COMPTE-MEMBRE/mon-compte-membre.html"
                data-space="membre"
              >
                Voir mon compte
              </a>

            </div>

          </div>
        </div>
      </section>

    </main>

    <div id="footer-container"></div>

  </div>

  <script>
    (() => {
      if (typeof window.corrigerCheminsSite === "function") {
        window.corrigerCheminsSite(document);
      }
    })();
  </script>

  <script>
    (() => {
      const messageAccueil = document.getElementById("message-accueil-membre");

      if (!messageAccueil) return;

      const workerIndexMembreUrl = (
        window.SITE_CONFIG?.workerIndexMembreUrl ||
        window.SITE_CONFIG?.WORKER_INDEX_MEMBRE_URL ||
        ""
      ).replace(/\/$/, "");

      if (!workerIndexMembreUrl) {
        messageAccueil.textContent = "Bonjour, que voulez-vous faire ?";
        return;
      }

      fetch(workerIndexMembreUrl, {
        method: "GET",
        credentials: "include",
        cache: "no-store",
        headers: {
          "Accept": "application/json"
        }
      })
        .then(async (response) => {
          const data = await response.json().catch(() => null);

          if (!response.ok || !data || data.success !== true || data.connected !== true) {
            messageAccueil.textContent = "Bonjour, que voulez-vous faire ?";
            return;
          }

          const prenom = nettoyerPrenom(data.prenommembre);

          messageAccueil.textContent = prenom
            ? `Bonjour ${prenom}, que voulez-vous faire ?`
            : "Bonjour, que voulez-vous faire ?";
        })
        .catch(() => {
          messageAccueil.textContent = "Bonjour, que voulez-vous faire ?";
        });
    })();

    function nettoyerPrenom(value) {
      return String(value || "")
        .trim()
        .replace(/\s+/g, " ")
        .slice(0, 60);
    }
  </script>

  <script>
    document.write(
      '<script src="' +
      window.construireUrlAsset("/OBJETS/BLOCS/burger-membre.js") +
      '"><\/script>'
    );

    document.write(
      '<script src="' +
      window.construireUrlAsset("/OBJETS/BLOCS/footer-global.js") +
      '"><\/script>'
    );
  </script>
</body>
</html>
